// ── Sparkline ───────────────────────────────────────────────────────
function Sparkline({data,color,w=80,h=36}){
  if(!data||data.length<2)return null;
  const mx=Math.max(...data),mn=Math.min(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>[+(i/(data.length-1)*w).toFixed(1),+((h-4)-((v-mn)/rng)*(h-8)+2).toFixed(1)]);
  const line=pts.map(p=>p.join(",")).join(" ");
  const area=`0,${h} ${line} ${w},${h}`;
  return(
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none" style={{display:"block"}}>
      <polygon points={area} fill={color} opacity=".10"/>
      <polyline points={line} stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2.5" fill={color}/>
    </svg>
  );
}

// ── Toast ───────────────────────────────────────────────────────────
const ToastCtx=createContext(null);
function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);
  const add=useCallback((msg,type="success")=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3400);
  },[]);
  const col={success:C.gr,error:C.rd,info:C.bl,warning:C.am};
  return(
    <ToastCtx.Provider value={add}>
      {children}
      <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:6,pointerEvents:"none"}}>
        {toasts.map(t=>(
          <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,background:C.el,border:`1px solid ${C.bd}`,borderLeft:`2px solid ${col[t.type]}`,borderRadius:8,padding:"10px 14px",boxShadow:"0 8px 32px rgba(0,0,0,.4)",animation:"slideIn .18s ease",minWidth:220,maxWidth:340,pointerEvents:"all"}}>
            <div style={{width:5,height:5,borderRadius:"50%",background:col[t.type],flexShrink:0}}/>
            <span style={{color:C.t2,fontSize:13,fontFamily:C.fn,lineHeight:1.4}}>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
function useToast(){return useContext(ToastCtx);}

  const[chars1,setChars1]=useState([]);

  const[progress,setProgress]=useState(0);
  const[exit,setExit]=useState(false);
  const N1="YAHYA RAEESANI",N2="ESHAL KHAN";

  useEffect(()=>{
    const T=[];
    T.push(setTimeout(()=>setPhase(1),300));
    T.push(setTimeout(()=>setPhase(2),900));
    T.push(setTimeout(()=>{
      setPhase(3);
      let i=0;
      const t=setInterval(()=>{
        const idx=i;
        setChars1(c=>[...c,{ch:N1[idx],lit:true}]);
        setTimeout(()=>setChars1(c=>c.map((x,k)=>k===idx?{...x,lit:false}:x)),220);
        i++;
        if(i>=N1.length)clearInterval(t);
      },55);
      T.push(t);
    },1200));
    T.push(setTimeout(()=>{
      setPhase(4);
      let i=0;
      const t=setInterval(()=>{
        const idx=i;
        setChars2(c=>[...c,{ch:N2[idx],lit:true}]);
        setTimeout(()=>setChars2(c=>c.map((x,k)=>k===idx?{...x,lit:false}:x)),220);
        i++;
        if(i>=N2.length)clearInterval(t);
      },68);
      T.push(t);
    },2100));
    T.push(setTimeout(()=>{
      let p=0;
      const t=setInterval(()=>{p+=2.2;setProgress(Math.min(p,100));if(p>=100)clearInterval(t);},16);
      T.push(t);
    },2900));
    T.push(setTimeout(()=>setExit(true),4200));
    T.push(setTimeout(()=>onDone(),4700));
    return()=>T.forEach(clearTimeout);
  },[]);

  const show=(p,d=0)=>({opacity:phase>=p?1:0,transform:phase>=p?"translateY(0)":"translateY(10px)",transition:`opacity .4s ${d}s ease,transform .4s ${d}s ease`});

  return(

          </svg>
        </div>
      </div>

      {/* Title */}
      <div style={{...show(1,.05),textAlign:"center",marginBottom:6}}>
        <div style={{fontSize:32,fontWeight:700,color:C.tx,letterSpacing:"-.03em",lineHeight:1}}>HAPMS</div>
      </div>
      <div style={{...show(2),textAlign:"center",marginBottom:40}}>
        <div style={{fontSize:11,color:C.t3,letterSpacing:".18em",textTransform:"uppercase",fontFamily:C.mo}}>Healthcare Operating System</div>
      </div>

      {/* Divider */}
      <div style={{width:phase>=2?200:0,height:1,background:C.bd,marginBottom:32,transition:"width .6s ease"}}/>

      {/* Credits */}

        <div style={{fontSize:11,color:C.t4,letterSpacing:".12em",textTransform:"uppercase",fontFamily:C.mo,textAlign:"center"}}>Crafted by</div>
      </div>

      <div style={{fontSize:18,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",height:28,display:"flex",alignItems:"center",marginBottom:8,fontFamily:C.mo}}>
        {chars1.map((c,i)=>(
          <span key={i} style={{color:c.lit?"#fff":C.gr,transition:"color .22s",display:"inline-block"}}>{c.ch===" "?" ":c.ch}</span>

        <div style={{width:16,height:1,background:C.bd}}/>

      <div style={{fontSize:15,fontWeight:500,letterSpacing:".12em",textTransform:"uppercase",height:24,display:"flex",alignItems:"center",marginBottom:40,fontFamily:C.mo}}>

        <p style={{textAlign:"center",fontSize:11,color:C.t4,marginTop:8,fontFamily:C.mo}}>click to autofill · demo credentials</p>
      </div>
    </div>
  );
}

// ── Command Palette ─────────────────────────────────────────────────
function CommandPalette({store,setActive,onClose}){
  const[q,setQ]=useState("");
  const ref=useRef();
  useEffect(()=>ref.current?.focus(),[]);
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose();};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[onClose]);

  const res=q.trim().length>1?{
    doctors:store.doctors.filter(d=>{const u=store.users.find(x=>x.id===d.userId)||{};return(u.name||"").toLowerCase().includes(q.toLowerCase())||d.specialization.toLowerCase().includes(q.toLowerCase());}).map(d=>{const u=store.users.find(x=>x.id===d.userId)||{};return{...d,_n:u.name};}).slice(0,3),
    patients:store.patients.filter(p=>{const u=store.users.find(x=>x.id===p.userId)||{};return(u.name||"").toLowerCase().includes(q.toLowerCase());}).map(p=>{const u=store.users.find(x=>x.id===p.userId)||{};return{...p,_n:u.name};}).slice(0,3),
    medicines:store.medicines.filter(m=>m.name.toLowerCase().includes(q.toLowerCase())||m.type.toLowerCase().includes(q.toLowerCase())).slice(0,3),
  }:null;

  const total=res?Object.values(res).flat().length:0;

  function go(s){setActive(s);onClose();}

  const Row=({color,title,sub,section})=>(
    <div onClick={()=>go(section)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",transition:"background .1s"}}
      onMouseEnter={e=>e.currentTarget.style.background=C.el} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <div style={{width:6,height:6,borderRadius:"50%",background:color,flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:C.tx,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{title}</div>
        <div style={{color:C.t3,fontSize:12,fontFamily:C.mo,marginTop:1}}>{sub}</div>
      </div>
      <span style={{color:C.t4,fontSize:11}}>↗</span>
    </div>
  );
  const Grp=({label})=><div style={{padding:"8px 16px 3px",fontSize:11,color:C.t4,fontFamily:C.mo,letterSpacing:".08em",textTransform:"uppercase"}}>{label}</div>;

  return(
    <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"12vh",background:"rgba(0,0,0,.7)",backdropFilter:"blur(8px)"}} onClick={onClose}>
      <div style={{width:"min(580px,92vw)",background:C.el,borderRadius:12,border:`1px solid ${C.bdm}`,boxShadow:"0 32px 80px rgba(0,0,0,.6)",animation:"scaleIn .16s ease",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${C.bd}`,gap:10}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={C.t3} strokeWidth="1.5" strokeLinecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search doctors, patients, medicines…" style={{flex:1,background:"none",border:"none",outline:"none",color:C.tx,fontSize:14,fontFamily:C.fn}}/>
          {q&&<button onClick={()=>setQ("")} style={{background:"none",border:"none",color:C.t3,cursor:"pointer",fontSize:12,padding:"2px 6px",borderRadius:4,transition:"color .1s"}} onMouseEnter={e=>e.currentTarget.style.color=C.tx} onMouseLeave={e=>e.currentTarget.style.color=C.t3}>✕</button>}
        </div>

        {res?(
          <div style={{maxHeight:"50vh",overflowY:"auto"}}>
            {total===0?(
              <div style={{padding:"32px",textAlign:"center",color:C.t3,fontSize:13}}>No results for "{q}"</div>
            ):(
              <>
                {res.doctors.length>0&&<><Grp label="Doctors"/>{res.doctors.map(d=><Row key={d.id} color={C.bl} title={d._n} sub={`${d.specialization} · ${d.licenseNo}`} section="doctors"/>)}</>}
                {res.patients.length>0&&<><Grp label="Patients"/>{res.patients.map(p=><Row key={p.id} color={C.gr} title={p._n} sub={`${p.bloodGroup} · ${calcAge(p.dob)}`} section="patients"/>)}</>}
                {res.medicines.length>0&&<><Grp label="Medicines"/>{res.medicines.map(m=><Row key={m.id} color={C.te} title={m.name} sub={`${m.type} · ₨${m.price} · ${m.stock} units`} section="medicines"/>)}</>}
              </>
            )}
          </div>
        ):(
          <div style={{padding:"12px 16px 14px"}}>
            <div style={{fontSize:11,color:C.t4,fontFamily:C.mo,letterSpacing:".08em",textTransform:"uppercase",marginBottom:10}}>Jump to</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[{l:"Doctors",s:"doctors",c:C.bl},{l:"Patients",s:"patients",c:C.gr},{l:"Appointments",s:"appointments",c:C.am},{l:"Medicines",s:"medicines",c:C.te},{l:"Reports",s:"reports",c:C.pu}].map(x=>(
                <button key={x.s} onClick={()=>go(x.s)} style={{padding:"5px 12px",borderRadius:6,background:C.sf,border:`1px solid ${C.bd}`,color:C.t2,cursor:"pointer",fontFamily:C.fn,fontSize:13,fontWeight:500,transition:"border-color .12s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=x.c} onMouseLeave={e=>e.currentTarget.style.borderColor=C.bd}>{x.l}</button>
              ))}
            </div>
          </div>
        )}

        <div style={{padding:"8px 16px",borderTop:`1px solid ${C.bd}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:C.t4,fontFamily:C.mo}}>⌘K to open · ESC to close</span>
          {res&&total>0&&<span style={{fontSize:11,color:C.t4,fontFamily:C.mo}}>{total} result{total!==1?"s":""}</span>}
        </div>
      </div>
    </div>
  );
}

// ── Primitives ──────────────────────────────────────────────────────
const IS={background:C.sf,border:`1px solid ${C.bd}`,borderRadius:8,padding:"9px 12px",color:C.tx,fontSize:14,outline:"none",fontFamily:"'Inter',-apple-system,sans-serif",boxSizing:"border-box",transition:"border-color .15s",width:"100%",WebkitAppearance:"none"};
const IF=e=>{e.target.style.borderColor=C.gr;};
const IB=e=>{e.target.style.borderColor=C.bd;};
function Inp(p){return<input {...p} style={{...IS,...(p.style||{})}} onFocus={IF} onBlur={IB}/>;}
function Sel({children,...p}){return<select {...p} style={{...IS,...(p.style||{})}} onFocus={IF} onBlur={IB}>{children}</select>;}
function Txta(p){return<textarea {...p} style={{...IS,minHeight:80,resize:"vertical",...(p.style||{})}} onFocus={IF} onBlur={IB}/>;}
function Field({label,children}){return(<div style={{marginBottom:16}}><label style={{display:"block",fontSize:12,color:C.t3,marginBottom:6,fontFamily:C.mo,letterSpacing:".04em"}}>{label}</label>{children}</div>);}
function ErrMsg({msg}){if(!msg)return null;return<div style={{background:C.rdb,border:`1px solid rgba(239,68,68,.18)`,borderRadius:7,padding:"9px 12px",color:C.rd,fontSize:13,marginBottom:16}}>{msg}</div>;}

function Modal({title,onClose,children,wide}){
  useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[onClose]);
  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.65)",backdropFilter:"blur(8px)"}}>
      <div style={{background:C.el,border:`1px solid ${C.bdm}`,borderRadius:14,padding:"24px",width:`min(${wide?"660px":"500px"},95vw)`,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 32px 80px rgba(0,0,0,.6)",animation:"scaleIn .18s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontSize:16,fontWeight:600,color:C.tx,margin:0,letterSpacing:"-.01em"}}>{title}</h2>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:7,background:C.sf,border:`1px solid ${C.bd}`,color:C.t3,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,transition:"background .15s,color .15s"}} onMouseEnter={e=>{e.currentTarget.style.background=C.ov;e.currentTarget.style.color=C.tx;}} onMouseLeave={e=>{e.currentTarget.style.background=C.sf;e.currentTarget.style.color=C.t3;}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Badge({status}){
  const c=sColor(status);
  return<span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:20,background:`${c}12`,border:`1px solid ${c}28`,color:c,fontSize:11,fontFamily:C.mo,letterSpacing:".02em"}}><span style={{width:4,height:4,borderRadius:"50%",background:c,display:"inline-block"}}/>{status}</span>;

function DataTable({cols,rows,onEdit,onDelete,onView}){
  return(
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead>
          <tr>{cols.map(c=><th key={c.key} style={{padding:"10px 16px",textAlign:"left",color:C.t3,fontFamily:C.mo,fontSize:11,letterSpacing:".08em",textTransform:"uppercase",borderBottom:`1px solid ${C.bd}`,fontWeight:500,whiteSpace:"nowrap"}}>{c.label}</th>)}{(onEdit||onDelete||onView)&&<th style={{padding:"10px 16px",borderBottom:`1px solid ${C.bd}`,width:1}}/>}</tr>
        </thead>
        <tbody>
          {rows.length===0&&<tr><td colSpan={cols.length+1} style={{padding:"48px 16px",textAlign:"center",color:C.t4,fontFamily:C.mo,fontSize:12,letterSpacing:".06em"}}>No records found</td></tr>}
          {rows.map((row,i)=>(
            <tr key={row.id??i} style={{transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.03)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              {cols.map(c=><td key={c.key} style={{padding:"12px 16px",borderBottom:`1px solid ${C.bd}`,color:C.tx,fontSize:13,verticalAlign:"middle"}}>{c.render?c.render(row[c.key],row):(c.mono?<span style={{fontFamily:C.mo,fontSize:12,color:C.t2}}>{row[c.key]??"-"}</span>:<span style={{color:C.t2,fontSize:13}}>{row[c.key]??"-"}</span>)}</td>)}
              {(onEdit||onDelete||onView)&&<td style={{padding:"12px 16px",borderBottom:`1px solid ${C.bd}`,whiteSpace:"nowrap",textAlign:"right"}}>
                <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>

                </div>

    </div>
  );
}

function StatCard({label,value,sub,color,sparkData}){

    <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,padding:20,transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.bdm} onMouseLeave={e=>e.currentTarget.style.borderColor=C.bd}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontSize:28,fontWeight:600,color:C.tx,fontFamily:C.mo,letterSpacing:"-.03em",lineHeight:1}}>{value}</div>

// ── Overview ────────────────────────────────────────────────────────
function Overview({store,setActive,currentUser}){
  const pending=store.appointments.filter(a=>a.status==="pending").length;
  const confirmed=store.appointments.filter(a=>a.status==="confirmed").length;
  const lowStock=store.medicines.filter(m=>m.stock<200).length;
  const upcoming=store.appointments.filter(a=>a.status==="pending"||a.status==="confirmed").slice(0,5);
  const recent=[...store.prescriptions].reverse().slice(0,4);

  const patientsSparkData=[2,3,2,4,3,4,store.patients.length];
  const apptSparkData=[3,4,3,5,4,5,store.appointments.length];
  const pendingSparkData=[1,2,1,3,2,3,pending];
  const docSparkData=[3,3,3,3,3,3,store.doctors.length];

  const drWorkload=store.doctors.map(d=>{
    const u=store.users.find(x=>x.id===d.userId)||{};

        <StatCard label="Doctors" value={store.doctors.length} sub="Active staff" color={C.bl} sparkData={docSparkData}/>

            <span style={{fontSize:13,fontWeight:600,color:C.tx}}>Upcoming Appointments</span>
            <button onClick={()=>setActive("appointments")} style={{fontSize:12,color:C.t3,background:"none",border:"none",cursor:"pointer",fontFamily:C.fn,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color=C.tx} onMouseLeave={e=>e.currentTarget.style.color=C.t3}>View all →</button>

                <div>

        </div>

      <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,padding:20}}>
        <div style={{fontSize:13,fontWeight:600,color:C.tx,marginBottom:16}}>Doctor Workload</div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>

                <div style={{height:"100%",width:`${(d.cnt/maxW)*100}%`,background:C.bl,borderRadius:2,transition:"width .6s ease"}}/>

          ))}
          {drWorkload.length===0&&<div style={{color:C.t4,fontSize:13}}>No doctors registered</div>}
        </div>
      </div>
    </div>
  );

// ── Doctors ─────────────────────────────────────────────────────────
function Doctors({store,setStore,readOnly}){
  const toast=useToast();
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[search,setSearch]=useState("");
  const[err,setErr]=useState("");
  const[confirmDel,setConfirmDel]=useState(null);
  const[viewDoc,setViewDoc]=useState(null);

  function openAdd(){setErr("");setForm({name:"",email:"",phone:"",specialization:SPECS[0],licenseNo:"",availStart:"08:00",availEnd:"17:00"});setModal("add");}
  function openEdit(d){setErr("");const u=store.users.find(x=>x.id===d.userId)||{};setForm({_dId:d.id,_uId:d.userId,name:u.name||"",email:u.email||"",phone:u.phone||"",specialization:d.specialization,licenseNo:d.licenseNo,availStart:d.availStart,availEnd:d.availEnd});setModal("edit");}

  function save(){
    setErr("");
    if(!form.name?.trim())return setErr("Full name is required.");
    if(!form.email?.trim())return setErr("Email is required.");
    if(!form.licenseNo?.trim())return setErr("License number is required.");
    if(modal==="add"){
      if(store.users.find(u=>u.email.toLowerCase()===form.email.trim().toLowerCase()))return setErr("Email already in use.");
      if(store.doctors.find(d=>d.licenseNo.toLowerCase()===form.licenseNo.trim().toLowerCase()))return setErr("License number already in use.");
      setStore(prev=>{const nU=nextId(prev.users),nD=nextId(prev.doctors);return{...prev,users:[...prev.users,{id:nU,name:form.name.trim(),email:form.email.trim(),role:"doctor",phone:form.phone.trim()}],doctors:[...prev.doctors,{id:nD,userId:nU,specialization:form.specialization,licenseNo:form.licenseNo.trim(),availStart:form.availStart,availEnd:form.availEnd}]};});
      toast("Doctor added successfully");
    }else{
      if(store.users.find(u=>u.email.toLowerCase()===form.email.trim().toLowerCase()&&u.id!==form._uId))return setErr("Email already in use.");
      setStore(prev=>({...prev,users:prev.users.map(u=>u.id===form._uId?{...u,name:form.name.trim(),email:form.email.trim(),phone:form.phone.trim()}:u),doctors:prev.doctors.map(d=>d.id===form._dId?{...d,specialization:form.specialization,licenseNo:form.licenseNo.trim(),availStart:form.availStart,availEnd:form.availEnd}:d)}));
      toast("Doctor updated");
    }
    setModal(null);
  }
  function doDelete(){setStore(s=>({...s,doctors:s.doctors.filter(x=>x.id!==confirmDel.id),users:s.users.filter(x=>x.id!==confirmDel.userId)}));toast("Doctor removed");setConfirmDel(null);}

  const rows=store.doctors.filter(d=>{const u=store.users.find(x=>x.id===d.userId)||{};return !search||(u.name||"").toLowerCase().includes(search.toLowerCase())||d.specialization.toLowerCase().includes(search.toLowerCase());}).map(d=>{const u=store.users.find(x=>x.id===d.userId)||{};return{...d,_name:u.name,_email:u.email,_phone:u.phone};});

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="Search doctors…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:240}}/>
        {!readOnly&&<button onClick={openAdd} className="btn-primary">Add Doctor</button>}
      </div>

// ── Patients ────────────────────────────────────────────────────────
function Patients({store,setStore}){
  const toast=useToast();
  const[modal,setModal]=useState(null);

  function openAdd(){setErr("");setForm({name:"",email:"",phone:"",dob:"",bloodGroup:"O+",medHistory:""});setModal("add");}

  function save(){
    setErr("");
    if(!form.name?.trim())return setErr("Full name is required.");
    if(!form.email?.trim())return setErr("Email is required.");
    if(modal==="add"){
      if(store.users.find(u=>u.email.toLowerCase()===form.email.trim().toLowerCase()))return setErr("Email already in use.");
      setStore(prev=>{const nU=nextId(prev.users),nP=nextId(prev.patients);return{...prev,users:[...prev.users,{id:nU,name:form.name.trim(),email:form.email.trim(),role:"patient",phone:form.phone.trim()}],patients:[...prev.patients,{id:nP,userId:nU,dob:form.dob,bloodGroup:form.bloodGroup,medHistory:form.medHistory}]};});
      toast("Patient registered");
    }else{
      if(store.users.find(u=>u.email.toLowerCase()===form.email.trim().toLowerCase()&&u.id!==form._uId))return setErr("Email already in use.");
      setStore(prev=>({...prev,users:prev.users.map(u=>u.id===form._uId?{...u,name:form.name.trim(),email:form.email.trim(),phone:form.phone.trim()}:u),patients:prev.patients.map(p=>p.id===form._pId?{...p,dob:form.dob,bloodGroup:form.bloodGroup,medHistory:form.medHistory}:p)}));
      toast("Patient updated");
    }
    setModal(null);
  }
  function doDelete(){setStore(s=>({...s,patients:s.patients.filter(x=>x.id!==confirmDel.id),users:s.users.filter(x=>x.id!==confirmDel.userId)}));toast("Patient removed");setConfirmDel(null);}

      <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,overflow:"hidden"}}>
        <DataTable
          cols={[
            {key:"_name",label:"Name",render:v=><span style={{fontSize:13,fontWeight:500,color:C.tx}}>{v}</span>},
            {key:"dob",label:"DOB / Age",render:v=><span style={{fontFamily:C.mo,fontSize:12,color:C.t2}}>{v||"—"} <span style={{color:C.t3}}>· {calcAge(v)}</span></span>},
            {key:"bloodGroup",label:"Blood",render:v=><span style={{fontFamily:C.mo,fontSize:12,fontWeight:600,color:bCol[v]||C.rd}}>{v}</span>},
            {key:"_email",label:"Email",render:v=><span style={{fontSize:12,color:C.t3}}>{v}</span>},
            {key:"medHistory",label:"History",render:v=><span style={{fontSize:12,color:C.t3}}>{(v||"").slice(0,40)}{(v||"").length>40?"…":""}</span>},
          ]}
          rows={rows}
          onView={p=>setViewPat(p)}
          onEdit={openEdit}
          onDelete={p=>setConfirmDel(p)}
        />
      </div>

      {viewPat&&(()=>{const appts=store.appointments.filter(a=>a.patientId===viewPat.id);const pres=store.prescriptions.filter(p=>p.patientId===viewPat.id);return(
        <Modal title="Patient Profile" onClose={()=>setViewPat(null)} wide>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[["Full Name",viewPat._name],["Email",viewPat._email],["Phone",viewPat._phone||"—"],["Date of Birth",viewPat.dob||"—"],["Age",calcAge(viewPat.dob)],["Blood Group",viewPat.bloodGroup]].map(([k,v])=>(
              <div key={k} style={{background:C.sf,borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:11,fontFamily:C.mo,textTransform:"uppercase",color:C.t3,marginBottom:4,letterSpacing:".06em"}}>{k}</div>
                <div style={{color:k==="Blood Group"?(bCol[v]||C.rd):C.tx,fontSize:13,fontWeight:k==="Blood Group"?600:400}}>{v}</div>
              </div>
            ))}
            <div style={{background:C.sf,borderRadius:8,padding:"12px 14px",gridColumn:"span 2"}}>
              <div style={{fontSize:11,fontFamily:C.mo,textTransform:"uppercase",color:C.t3,marginBottom:4,letterSpacing:".06em"}}>Medical History</div>
              <div style={{color:C.t2,fontSize:13}}>{viewPat.medHistory||"—"}</div>
            </div>
          </div>
          <div style={{fontSize:11,fontFamily:C.mo,textTransform:"uppercase",color:C.t3,marginBottom:12,letterSpacing:".08em"}}>Appointments ({appts.length})</div>
          {appts.length===0&&<p style={{color:C.t4,fontSize:13,marginBottom:12}}>No appointments</p>}
          {appts.map(a=><div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.bd}`}}><div><div style={{fontSize:13,color:C.tx,fontWeight:500}}>{getDrName(store,a.doctorId)}</div><div style={{fontSize:11,color:C.t3,fontFamily:C.mo,marginTop:2}}>{a.scheduledAt.slice(0,16)} · {a.notes}</div></div><Badge status={a.status}/></div>)}
          {pres.length>0&&<><div style={{fontSize:11,fontFamily:C.mo,textTransform:"uppercase",color:C.t3,margin:"16px 0 12px",letterSpacing:".08em"}}>Prescriptions ({pres.length})</div>
          {pres.map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.bd}`}}><div><div style={{fontSize:13,color:C.tx,fontWeight:500}}>{getMedName(store,p.medicineId)} — {p.dosage}</div><div style={{fontSize:11,color:C.t3,fontFamily:C.mo,marginTop:2}}>{p.frequency} · {p.durationDays}d</div></div><span style={{fontSize:11,color:C.gr,fontFamily:C.mo}}>{p.issuedDate}</span></div>)}</>}
        </Modal>
      );})()}

      {modal&&<Modal title={modal==="add"?"New Patient":"Edit Patient"} onClose={()=>setModal(null)}>
        <ErrMsg msg={err}/>
        <Field label="FULL NAME"><Inp value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field>
        <Field label="EMAIL"><Inp type="email" value={form.email||""} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></Field>
        <Field label="PHONE"><Inp value={form.phone||""} onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="DATE OF BIRTH"><Inp type="date" value={form.dob||""} onChange={e=>setForm(f=>({...f,dob:e.target.value}))}/></Field>
          <Field label="BLOOD GROUP"><Sel value={form.bloodGroup||"O+"} onChange={e=>setForm(f=>({...f,bloodGroup:e.target.value}))}>{BLOOD.map(b=><option key={b}>{b}</option>)}</Sel></Field>
        </div>
        <Field label="MEDICAL HISTORY"><Txta value={form.medHistory||""} onChange={e=>setForm(f=>({...f,medHistory:e.target.value}))}/></Field>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button onClick={()=>setModal(null)} className="btn-ghost">Cancel</button>
          <button onClick={save} className="btn-primary">Save Patient</button>
        </div>

      {confirmDel&&<ConfirmDialog message={`Remove "${confirmDel._name}" from the system?`} onConfirm={doDelete} onCancel={()=>setConfirmDel(null)}/>}
    </div>
  );
}

// ── Appointments ────────────────────────────────────────────────────
function Appointments({store,setStore,currentUser}){
  const toast=useToast();
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[filter,setFilter]=useState("all");
  const[err,setErr]=useState("");
  const[confirmDel,setConfirmDel]=useState(null);

  function openAdd(){setErr("");setForm({patientId:store.patients[0]?.id||"",doctorId:currentUser.role==="doctor"?currentUser.doctorId:(store.doctors[0]?.id||""),scheduledAt:"",status:"pending",notes:""});setModal("add");}
  function openEdit(a){setErr("");setForm({...a,scheduledAt:a.scheduledAt.slice(0,16).replace(" ","T")});setModal("edit");}
  function handleDelete(a){if(store.prescriptions.find(p=>p.appointmentId===a.id)){toast("Cannot delete — prescription linked","error");return;}setConfirmDel(a);}
  function doDelete(){setStore(s=>({...s,appointments:s.appointments.filter(x=>x.id!==confirmDel.id)}));toast("Appointment deleted");setConfirmDel(null);}

  function save(){
    setErr("");
    if(!form.patientId||!form.doctorId||!form.scheduledAt)return setErr("Patient, doctor and date/time are required.");
    const slot=(form.scheduledAt||"").replace("T"," ")+":00";
    if(store.appointments.find(a=>a.doctorId===Number(form.doctorId)&&a.scheduledAt.slice(0,16)===slot.slice(0,16)&&a.id!==form.id))
      return setErr("This doctor already has an appointment at that time.");
    if(modal==="add"){setStore(p=>{const id=nextId(p.appointments);return{...p,appointments:[...p.appointments,{id,patientId:Number(form.patientId),doctorId:Number(form.doctorId),scheduledAt:slot,status:form.status||"pending",notes:form.notes}]};});toast("Appointment booked");}
    else{setStore(p=>({...p,appointments:p.appointments.map(a=>a.id===form.id?{...a,patientId:Number(form.patientId),doctorId:Number(form.doctorId),scheduledAt:slot,status:form.status,notes:form.notes}:a)}));toast("Appointment updated");}
    setModal(null);
  }

  const base=currentUser.role==="doctor"?store.appointments.filter(a=>a.doctorId===currentUser.doctorId):store.appointments;
  const rows=base.filter(a=>filter==="all"||a.status===filter).map(a=>({...a,_patient:getPtName(store,a.patientId),_doctor:getDrName(store,a.doctorId)}));
  const STATS=["all","pending","confirmed","completed","cancelled"];

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {STATS.map(s=>(
            <button key={s} onClick={()=>setFilter(s)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${filter===s?sColor(s):C.bd}`,background:filter===s?`${sColor(s)}10`:"transparent",color:filter===s?sColor(s):C.t3,cursor:"pointer",fontSize:12,fontFamily:C.mo,transition:"all .14s"}}>
              {s.charAt(0).toUpperCase()+s.slice(1)}
            </button>
          ))}
        </div>
        <button onClick={openAdd} className="btn-primary">Book Appointment</button>
      </div>
      <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,overflow:"hidden"}}>
        <DataTable
          cols={[
            {key:"_patient",label:"Patient",render:v=><span style={{fontSize:13,fontWeight:500,color:C.tx}}>{v}</span>},
            {key:"_doctor",label:"Doctor",render:v=><span style={{fontSize:13,color:C.t2}}>{v}</span>},
            {key:"scheduledAt",label:"Date & Time",render:v=><span style={{fontFamily:C.mo,fontSize:12,color:C.t2}}>{v.slice(0,16)}</span>},
            {key:"status",label:"Status",render:v=><Badge status={v}/>},
            {key:"notes",label:"Notes",render:v=><span style={{fontSize:12,color:C.t3}}>{(v||"").slice(0,36)}{(v||"").length>36?"…":""}</span>},
          ]}
          rows={rows}
          onEdit={openEdit}
          onDelete={handleDelete}
        />
      </div>
      {modal&&<Modal title={modal==="add"?"Book Appointment":"Edit Appointment"} onClose={()=>setModal(null)}>
        <ErrMsg msg={err}/>
        <Field label="PATIENT"><Sel value={form.patientId||""} onChange={e=>setForm(f=>({...f,patientId:e.target.value}))}>{store.patients.map(p=>{const u=store.users.find(x=>x.id===p.userId);return<option key={p.id} value={p.id}>{u?.name}</option>;})}</Sel></Field>
        <Field label="DOCTOR"><Sel value={form.doctorId||""} onChange={e=>setForm(f=>({...f,doctorId:e.target.value}))} disabled={currentUser.role==="doctor"}>{store.doctors.map(d=>{const u=store.users.find(x=>x.id===d.userId);return<option key={d.id} value={d.id}>{u?.name} — {d.specialization}</option>;})}</Sel></Field>
        <Field label="DATE & TIME"><Inp type="datetime-local" value={(form.scheduledAt||"").slice(0,16)} onChange={e=>setForm(f=>({...f,scheduledAt:e.target.value}))}/></Field>
        <Field label="STATUS"><Sel value={form.status||"pending"} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>{["pending","confirmed","completed","cancelled"].map(s=><option key={s}>{s}</option>)}</Sel></Field>
        <Field label="NOTES"><Txta value={form.notes||""} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></Field>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button onClick={()=>setModal(null)} className="btn-ghost">Cancel</button>
          <button onClick={save} className="btn-primary">Save</button>
        </div>
      </Modal>}
      {confirmDel&&<ConfirmDialog message={`Delete appointment for "${confirmDel._patient}"?`} onConfirm={doDelete} onCancel={()=>setConfirmDel(null)}/>}
    </div>
  );
}

// ── Prescriptions ───────────────────────────────────────────────────
function Prescriptions({store,setStore,currentUser}){
  const toast=useToast();
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[search,setSearch]=useState("");
  const[err,setErr]=useState("");
  const[confirmDel,setConfirmDel]=useState(null);

  const freeAppts=store.appointments.filter(a=>{
    const ok=a.status==="completed"&&!store.prescriptions.find(p=>p.appointmentId===a.id);
    return currentUser.role==="doctor"?ok&&a.doctorId===currentUser.doctorId:ok;
  });

  function openAdd(){setErr("");if(!freeAppts.length){toast("No completed appointments available","warning");return;}const a=freeAppts[0];setForm({appointmentId:a.id,doctorId:a.doctorId,patientId:a.patientId,medicineId:store.medicines[0]?.id||1,dosage:"",frequency:"Once daily",durationDays:7,issuedDate:new Date().toISOString().slice(0,10),diagnosis:""});setModal("add");}
  function openEdit(p){setErr("");setForm({...p});setModal("edit");}
  function doDelete(){setStore(s=>({...s,prescriptions:s.prescriptions.filter(x=>x.id!==confirmDel.id)}));toast("Prescription deleted");setConfirmDel(null);}

  function save(){
    setErr("");
    if(!form.dosage?.trim())return setErr("Dosage is required.");
    if(!form.diagnosis?.trim())return setErr("Diagnosis is required.");
    if(Number(form.durationDays)<1)return setErr("Duration must be at least 1 day.");
    if(modal==="add"){setStore(prev=>{const id=nextId(prev.prescriptions);return{...prev,prescriptions:[...prev.prescriptions,{id,...form,medicineId:Number(form.medicineId),durationDays:Number(form.durationDays),appointmentId:Number(form.appointmentId),doctorId:Number(form.doctorId),patientId:Number(form.patientId)}]};});toast("Prescription issued");}
    else{setStore(prev=>({...prev,prescriptions:prev.prescriptions.map(p=>p.id===form.id?{...form,medicineId:Number(form.medicineId),durationDays:Number(form.durationDays)}:p)}));toast("Prescription updated");}
    setModal(null);
  }

  const base=currentUser.role==="doctor"?store.prescriptions.filter(p=>p.doctorId===currentUser.doctorId):store.prescriptions;
  const rows=base.filter(p=>{const n=getPtName(store,p.patientId);return !search||n.toLowerCase().includes(search.toLowerCase())||getMedName(store,p.medicineId).toLowerCase().includes(search.toLowerCase());}).map(p=>({...p,_patient:getPtName(store,p.patientId),_doctor:getDrName(store,p.doctorId),_medicine:getMedName(store,p.medicineId)}));

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="Search prescriptions…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:240}}/>
        <button onClick={openAdd} className="btn-primary">Issue Prescription</button>
      </div>
      <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,overflow:"hidden"}}>
        <DataTable
          cols={[
            {key:"_patient",label:"Patient",render:v=><span style={{fontSize:13,fontWeight:500,color:C.tx}}>{v}</span>},
            {key:"_doctor",label:"Doctor",render:v=><span style={{fontSize:13,color:C.t2}}>{v}</span>},
            {key:"_medicine",label:"Medicine",render:v=><span style={{fontSize:13,color:C.t2}}>{v}</span>},
            {key:"dosage",label:"Dosage",mono:true},
            {key:"frequency",label:"Frequency",render:v=><span style={{fontSize:12,color:C.t3}}>{v}</span>},
            {key:"durationDays",label:"Days",mono:true},
            {key:"issuedDate",label:"Issued",mono:true},
          ]}
          rows={rows}
          onEdit={openEdit}
          onDelete={p=>setConfirmDel(p)}
        />
      </div>
      {modal&&<Modal title={modal==="add"?"Issue Prescription":"Edit Prescription"} onClose={()=>setModal(null)}>
        <ErrMsg msg={err}/>
        {modal==="add"&&<Field label="APPOINTMENT"><Sel value={form.appointmentId||""} onChange={e=>{const a=store.appointments.find(x=>x.id===Number(e.target.value));if(a)setForm(f=>({...f,appointmentId:a.id,doctorId:a.doctorId,patientId:a.patientId}));}}>{freeAppts.map(a=><option key={a.id} value={a.id}>#{a.id} · {getPtName(store,a.patientId)} with {getDrName(store,a.doctorId)}</option>)}</Sel></Field>}
        <Field label="MEDICINE"><Sel value={form.medicineId||store.medicines[0]?.id} onChange={e=>setForm(f=>({...f,medicineId:e.target.value}))}>{store.medicines.map(m=><option key={m.id} value={m.id}>{m.name} ({m.type})</option>)}</Sel></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="DOSAGE"><Inp value={form.dosage||""} placeholder="e.g. 500mg" onChange={e=>setForm(f=>({...f,dosage:e.target.value}))}/></Field>
          <Field label="DURATION (DAYS)"><Inp type="number" min={1} value={form.durationDays||7} onChange={e=>setForm(f=>({...f,durationDays:e.target.value}))}/></Field>
        </div>
        <Field label="FREQUENCY"><Sel value={form.frequency||"Once daily"} onChange={e=>setForm(f=>({...f,frequency:e.target.value}))}>{["Once daily","Twice daily","Three times daily","Every 8 hours","As needed"].map(x=><option key={x}>{x}</option>)}</Sel></Field>
        <Field label="ISSUED DATE"><Inp type="date" value={form.issuedDate||""} onChange={e=>setForm(f=>({...f,issuedDate:e.target.value}))}/></Field>
        <Field label="DIAGNOSIS"><Txta value={form.diagnosis||""} onChange={e=>setForm(f=>({...f,diagnosis:e.target.value}))}/></Field>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button onClick={()=>setModal(null)} className="btn-ghost">Cancel</button>
          <button onClick={save} className="btn-primary">Save</button>
        </div>
      </Modal>}
      {confirmDel&&<ConfirmDialog message="Delete this prescription?" onConfirm={doDelete} onCancel={()=>setConfirmDel(null)}/>}
    </div>
  );
}

// ── Medicines ───────────────────────────────────────────────────────
function Medicines({store,setStore,readOnly}){
  const toast=useToast();
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[search,setSearch]=useState("");
  const[err,setErr]=useState("");
  const[confirmDel,setConfirmDel]=useState(null);

  function openAdd(){setErr("");setForm({name:"",type:MED_TYPES[0],manufacturer:"",stock:"",price:""});setModal("add");}
  function openEdit(m){setErr("");setForm({...m});setModal("edit");}
  function handleDelete(m){if(store.prescriptions.find(p=>p.medicineId===m.id)){toast("Cannot delete — medicine is prescribed","error");return;}setConfirmDel(m);}
  function doDelete(){setStore(s=>({...s,medicines:s.medicines.filter(x=>x.id!==confirmDel.id)}));toast("Medicine removed");setConfirmDel(null);}

  function save(){
    setErr("");
    if(!form.name?.trim())return setErr("Medicine name is required.");
    if(!form.manufacturer?.trim())return setErr("Manufacturer is required.");
    if(modal==="add"){
      if(store.medicines.find(m=>m.name.toLowerCase()===form.name.trim().toLowerCase()))return setErr("Medicine already exists.");
      setStore(prev=>{const id=nextId(prev.medicines);return{...prev,medicines:[...prev.medicines,{id,name:form.name.trim(),type:form.type,manufacturer:form.manufacturer.trim(),stock:Number(form.stock)||0,price:Number(form.price)||0}]};});
      toast("Medicine added");
    }else{
      setStore(prev=>({...prev,medicines:prev.medicines.map(m=>m.id===form.id?{...m,name:form.name.trim(),type:form.type,manufacturer:form.manufacturer.trim(),stock:Number(form.stock)||0,price:Number(form.price)||0}:m)}));
      toast("Medicine updated");
    }
    setModal(null);
  }

  const typeCol={"Antibiotic":C.bl,"Analgesic":C.am,"Antidiabetic":C.pu,"ACE Inhibitor":C.te,"Statin":C.gr,"PPI":"#fb923c","Bronchodilator":C.bl,"Antihistamine":C.pu};
  const rows=store.medicines.filter(m=>!search||m.name.toLowerCase().includes(search.toLowerCase())||m.type.toLowerCase().includes(search.toLowerCase())||m.manufacturer.toLowerCase().includes(search.toLowerCase()));

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8,flexWrap:"wrap"}}>
        <Inp placeholder="Search medicines…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:280}}/>
        {!readOnly&&<button onClick={openAdd} className="btn-primary">Add Medicine</button>}
      </div>
      <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,overflow:"hidden"}}>
        <DataTable
          cols={[
            {key:"name",label:"Medicine",render:v=><span style={{fontSize:13,fontWeight:500,color:C.tx}}>{v}</span>},
            {key:"type",label:"Type",render:v=>{const col=typeCol[v]||C.gr;return<span style={{padding:"2px 8px",borderRadius:4,background:`${col}14`,border:`1px solid ${col}28`,color:col,fontSize:11,fontFamily:C.mo}}>{v}</span>;}},
            {key:"manufacturer",label:"Manufacturer",render:v=><span style={{fontSize:12,color:C.t3}}>{v}</span>},
            {key:"stock",label:"Stock",render:v=><span style={{fontFamily:C.mo,fontSize:12,fontWeight:600,color:v<100?C.rd:v<300?C.am:C.gr}}>{v} <span style={{fontWeight:400,color:C.t3}}>units</span></span>},
            {key:"price",label:"Price",render:v=><span style={{fontFamily:C.mo,fontSize:12,color:C.t2}}>₨{v}</span>},
          ]}
          rows={rows}
          onEdit={readOnly?null:openEdit}
          onDelete={readOnly?null:handleDelete}
        />
      </div>
      {!readOnly&&modal&&<Modal title={modal==="add"?"Add Medicine":"Edit Medicine"} onClose={()=>setModal(null)}>
        <ErrMsg msg={err}/>
        <Field label="MEDICINE NAME"><Inp value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field>
        <Field label="TYPE"><Sel value={form.type||MED_TYPES[0]} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{MED_TYPES.map(t=><option key={t}>{t}</option>)}</Sel></Field>
        <Field label="MANUFACTURER"><Inp value={form.manufacturer||""} onChange={e=>setForm(f=>({...f,manufacturer:e.target.value}))}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="STOCK (UNITS)"><Inp type="number" min={0} value={form.stock||""} placeholder="0" onChange={e=>setForm(f=>({...f,stock:e.target.value}))}/></Field>
          <Field label="PRICE (PKR)"><Inp type="number" min={0} value={form.price||""} placeholder="0" onChange={e=>setForm(f=>({...f,price:e.target.value}))}/></Field>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button onClick={()=>setModal(null)} className="btn-ghost">Cancel</button>
          <button onClick={save} className="btn-primary">Save</button>
        </div>
      </Modal>}
      {confirmDel&&<ConfirmDialog message={`Remove "${confirmDel.name}" from catalogue?`} onConfirm={doDelete} onCancel={()=>setConfirmDel(null)}/>}
    </div>
  );
}

// ── Reports ─────────────────────────────────────────────────────────
function Reports({store}){
  const total=store.appointments.length;
  const done=store.appointments.filter(a=>a.status==="completed").length;
  const lowStock=store.medicines.filter(m=>m.stock<200).length;
  const compRate=total>0?Math.round((done/total)*100):0;

  const apptData=[
    {label:"Completed",value:done,color:C.gr},
    {label:"Pending",value:store.appointments.filter(a=>a.status==="pending").length,color:C.am},
    {label:"Confirmed",value:store.appointments.filter(a=>a.status==="confirmed").length,color:C.bl},
    {label:"Cancelled",value:store.appointments.filter(a=>a.status==="cancelled").length,color:C.rd},
  ];

  const bloodData=BLOOD.map(b=>({label:b,value:store.patients.filter(p=>p.bloodGroup===b).length,color:C.rd})).filter(x=>x.value>0);
  const specData=store.doctors.reduce((acc,d)=>{acc[d.specialization]=(acc[d.specialization]||0)+1;return acc;},{});
  const stockData=[...store.medicines].sort((a,b)=>a.stock-b.stock).slice(0,8);
  const maxStock=Math.max(...stockData.map(m=>m.stock))||1;

  const Bar=({value,max,color})=>(
    <div style={{height:4,background:C.el,borderRadius:2,overflow:"hidden",marginTop:4}}>
      <div style={{height:"100%",width:`${Math.min(100,(value/max)*100)}%`,background:color,borderRadius:2,transition:"width .7s ease"}}/>
    </div>
  );

  const SCard=({label,value,color,sub})=>(
    <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,padding:20,position:"relative",overflow:"hidden"}}>
      <div style={{fontSize:28,fontWeight:600,color,fontFamily:C.mo,letterSpacing:"-.02em",lineHeight:1,marginBottom:6}}>{value}</div>
      <div style={{fontSize:12,color:C.t3,fontFamily:C.mo,letterSpacing:".06em",textTransform:"uppercase"}}>{label}</div>
      {sub&&<div style={{fontSize:12,color:C.t3,marginTop:4}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:24}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
        <SCard label="Total Users" value={store.users.length} color={C.gr} sub="In system"/>
        <SCard label="Completion Rate" value={`${compRate}%`} color={C.bl} sub="Appointments"/>
        <SCard label="Low Stock" value={lowStock} color={lowStock>0?C.am:C.gr} sub={lowStock>0?"Below 200 units":"All stocked"}/>
        <SCard label="Prescriptions" value={store.prescriptions.length} color={C.pu} sub="Issued"/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {/* Appointment Distribution */}
        <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,padding:20}}>
          <div style={{fontSize:13,fontWeight:600,color:C.tx,marginBottom:16}}>Appointment Status</div>
          {apptData.map(({label,value,color})=>(
            <div key={label} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,color:C.t2}}>{label}</span>
                <span style={{fontSize:12,fontFamily:C.mo,color:color}}>{value} <span style={{color:C.t3}}>({total>0?Math.round((value/total)*100):0}%)</span></span>
              </div>
              <Bar value={value} max={total||1} color={color}/>
            </div>
          ))}
        </div>

        {/* Blood Groups */}
        <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,padding:20}}>
          <div style={{fontSize:13,fontWeight:600,color:C.tx,marginBottom:16}}>Patient Blood Groups</div>
          {bloodData.length===0?(
            <p style={{color:C.t4,fontSize:13}}>No patient data</p>
          ):(
            bloodData.map(({label,value})=>(
              <div key={label} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,fontFamily:C.mo,color:C.t2}}>{label}</span>
                  <span style={{fontSize:12,fontFamily:C.mo,color:C.t2}}>{value} patient{value!==1?"s":""}</span>
                </div>
                <Bar value={value} max={store.patients.length||1} color={C.rd}/>
              </div>
            ))
          )}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {/* Specializations */}
        <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,padding:20}}>
          <div style={{fontSize:13,fontWeight:600,color:C.tx,marginBottom:16}}>Doctors by Specialization</div>
          {Object.keys(specData).length===0?(
            <p style={{color:C.t4,fontSize:13}}>No doctors registered</p>
          ):(
            Object.entries(specData).map(([spec,cnt])=>(
              <div key={spec} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,color:C.t2}}>{spec}</span>
                  <span style={{fontSize:12,fontFamily:C.mo,color:C.bl}}>{cnt}</span>
                </div>
                <Bar value={cnt} max={store.doctors.length||1} color={C.bl}/>
              </div>
            ))
          )}
        </div>

        {/* Medicine Inventory */}
        <div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:10,padding:20}}>
          <div style={{fontSize:13,fontWeight:600,color:C.tx,marginBottom:16}}>Medicine Inventory Health</div>
          {stockData.map(m=>(
            <div key={m.id} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,color:C.t2}}>{m.name}</span>
                <span style={{fontSize:12,fontFamily:C.mo,color:m.stock<100?C.rd:m.stock<300?C.am:C.gr}}>{m.stock}</span>
              </div>
              <Bar value={m.stock} max={maxStock} color={m.stock<100?C.rd:m.stock<300?C.am:C.gr}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

                </div>
              )}
            </div>
          </header>

          {/* Content */}
          <div key={active} style={{flex:1,padding:32,animation:"fadeUp .22s ease"}}>
            {active==="overview"      &&<Overview store={store} setActive={setActive} currentUser={user}/>}
            {active==="doctors"       &&<Doctors store={store} setStore={setStore} readOnly={user.role==="receptionist"}/>}
            {active==="patients"      &&<Patients store={store} setStore={setStore}/>}
            {active==="appointments"  &&<Appointments store={store} setStore={setStore} currentUser={user}/>}
            {active==="prescriptions" &&<Prescriptions store={store} setStore={setStore} currentUser={user}/>}
            {active==="medicines"     &&<Medicines store={store} setStore={setStore} readOnly={user.role!=="admin"}/>}
            {active==="reports"       &&<Reports store={store}/>}
          </div>

          {/* Footer */}
          <footer style={{height:40,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 32px",borderTop:`1px solid ${C.bd}`,flexShrink:0}}>
            <span style={{fontFamily:C.mo,fontSize:11,color:C.t4}}>HAPMS — Hospital Administration & Patient Management System</span>
            <span style={{fontFamily:C.mo,fontSize:11,color:C.t4}}>Yahya Raeesani &amp; Eshal Khan</span>
          </footer>
        </main>
      </div>

      {searchOpen&&<CommandPalette store={store} setActive={setActive} onClose={()=>setSearchOpen(false)}/>}
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
